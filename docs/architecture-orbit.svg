<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sanskritized Hindi Lexicon architecture orbit</title>
  <desc id="desc">An animated space-style architecture diagram showing the data, logic, UI, pages, hooks, tests, and build layers orbiting the Sanskritized Hindi Lexicon core.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#3d241a"/>
      <stop offset="42%" stop-color="#201613"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </radialGradient>
    <linearGradient id="saffron" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0b35f"/>
      <stop offset="100%" stop-color="#bf4f17"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#9cc8ff"/>
      <stop offset="100%" stop-color="#5577a8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font: 600 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f7eee2; }
      .sub { font: 500 12px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbbdad; letter-spacing: .06em; }
      .orbit { stroke: rgba(244, 214, 172, .28); stroke-width: 1.25; stroke-dasharray: 4 10; }
      .star { fill: #f6dfb8; opacity: .7; }
      .planet { filter: url(#glow); }
      @media (prefers-reduced-motion: reduce) {
        animateTransform, animate { display: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#space)"/>
  <g opacity=".75">
    <circle class="star" cx="90" cy="84" r="1.8"/>
    <circle class="star" cx="210" cy="156" r="1.2"/>
    <circle class="star" cx="1044" cy="102" r="1.5"/>
    <circle class="star" cx="987" cy="432" r="1.2"/>
    <circle class="star" cx="1120" cy="278" r="2"/>
    <circle class="star" cx="140" cy="420" r="1.4"/>
    <circle class="star" cx="376" cy="74" r="1.1"/>
    <circle class="star" cx="824" cy="64" r="1.4"/>
    <circle class="star" cx="712" cy="492" r="1.2"/>
    <circle class="star" cx="480" cy="488" r="1.7"/>
  </g>

  <circle class="orbit" cx="600" cy="280" r="118"/>
  <circle class="orbit" cx="600" cy="280" r="186"/>
  <circle class="orbit" cx="600" cy="280" r="256"/>

  <g filter="url(#glow)">
    <circle cx="600" cy="280" r="76" fill="url(#saffron)" opacity=".98"/>
    <circle cx="600" cy="280" r="54" fill="#f5e6c8" opacity=".18"/>
    <text x="600" y="264" text-anchor="middle" class="label" font-size="22">Sanskritized Hindi</text>
    <text x="600" y="290" text-anchor="middle" class="label" font-size="22">Lexicon</text>
    <text x="600" y="318" text-anchor="middle" class="sub">ARCHIVE CORE</text>
  </g>

  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 600 280" to="360 600 280" dur="28s" repeatCount="indefinite"/>
    <g transform="translate(600 94)">
      <circle class="planet" r="34" fill="url(#blue)"/>
      <text y="5" text-anchor="middle" class="label" font-size="14">Data</text>
    </g>
    <g transform="translate(600 466)">
      <circle class="planet" r="34" fill="#536b48"/>
      <text y="5" text-anchor="middle" class="label" font-size="14">Tests</text>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="360 600 280" to="0 600 280" dur="36s" repeatCount="indefinite"/>
    <g transform="translate(344 280)">
      <circle class="planet" r="38" fill="#7d4f9c"/>
      <text y="5" text-anchor="middle" class="label" font-size="14">Pages</text>
    </g>
    <g transform="translate(856 280)">
      <circle class="planet" r="42" fill="#aa5c35"/>
      <text y="-4" text-anchor="middle" class="label" font-size="14">Components</text>
      <text y="14" text-anchor="middle" class="sub">UI SYSTEM</text>
    </g>
  </g>

  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0 600 280" to="360 600 280" dur="44s" repeatCount="indefinite"/>
    <g transform="translate(420 100)">
      <circle class="planet" r="32" fill="#8a6b35"/>
      <text y="5" text-anchor="middle" class="label" font-size="13">Hooks</text>
    </g>
    <g transform="translate(780 460)">
      <circle class="planet" r="32" fill="#365f76"/>
      <text y="5" text-anchor="middle" class="label" font-size="13">Lib</text>
    </g>
  </g>

  <g opacity=".95">
    <line x1="600" y1="204" x2="600" y2="128" stroke="#f7d9a8" stroke-opacity=".28"/>
    <line x1="676" y1="280" x2="814" y2="280" stroke="#f7d9a8" stroke-opacity=".28"/>
    <line x1="524" y1="280" x2="382" y2="280" stroke="#f7d9a8" stroke-opacity=".28"/>
  </g>

  <text x="48" y="500" class="sub">VITE + REACT + TYPESCRIPT + TAILWIND</text>
  <text x="1152" y="500" text-anchor="end" class="sub">STATIC ARCHIVE · SEARCH · LEARN · REPLACE</text>
</svg>
